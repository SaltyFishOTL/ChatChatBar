name: Release APK

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "Version, for example 1.0.2 or v1.0.2"
        required: true
        type: string
      releaseNotes:
        description: "Release notes"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.versionName }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    env:
      VERSION_NAME: ${{ inputs.versionName }}
      RELEASE_NOTES: ${{ inputs.releaseNotes }}
      CHATBAR_SUPABASE_URL: ${{ secrets.CHATBAR_SUPABASE_URL || 'https://rrlxofrrgfnhjfyrqvry.supabase.co' }}
      CHATBAR_SUPABASE_ANON_KEY: ${{ secrets.CHATBAR_SUPABASE_ANON_KEY || 'sb_publishable_J56aQ_JJLnank-dv1olMdg_d87xNQjD' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        run: |
          set -euo pipefail
          normalized_version="$(python3 - <<'PY'
          import os
          import re
          import sys

          version = os.environ["VERSION_NAME"].strip()
          if version.lower().startswith("v"):
              version = version[1:]

          if not re.fullmatch(r"[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z]+)?", version):
              print("Version must look like 1.0.2 or v1.0.2")
              sys.exit(1)

          print(version)
          PY
          )"
          VERSION_NAME="${normalized_version}"
          echo "VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/v$VERSION_NAME" >/dev/null; then
            echo "Tag v$VERSION_NAME already exists"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bump Android version
        id: version
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("app/app/build.gradle.kts")
          text = path.read_text(encoding="utf-8")
          code_match = re.search(r'val\s+baseVersionCode\s*=\s*(\d+)', text)
          if not code_match:
              raise SystemExit("baseVersionCode not found")

          next_code = int(code_match.group(1)) + 1
          version_name = os.environ["VERSION_NAME"]
          text, code_updates = re.subn(
              r'val\s+baseVersionCode\s*=\s*\d+',
              f'val baseVersionCode = {next_code}',
              text,
              count=1,
          )
          version_pattern = re.compile(
              r'(versionName\s*=\s*providers\.gradleProperty\("CHATBAR_VERSION_NAME"\)\s*'
              r'\n\s*\.orElse\(providers\.environmentVariable\("CHATBAR_VERSION_NAME"\)\)\s*'
              r'\n\s*\.orElse\(")[^"]+("\)\s*'
              r'\n\s*\.get\(\))'
          )
          text, version_updates = version_pattern.subn(
              lambda match: f"{match.group(1)}{version_name}{match.group(2)}",
              text,
              count=1,
          )
          if code_updates != 1:
              raise SystemExit("baseVersionCode update failed")
          if version_updates != 1:
              raise SystemExit("versionName default update failed")
          path.write_text(text, encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"versionCode={next_code}\n")
              output.write(f"versionName={version_name}\n")
          PY

      - name: Decode release keystore
        run: |
          set -euo pipefail
          mkdir -p app/app/keystore
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > app/app/keystore/release.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Validate Supabase configuration
        run: |
          set -euo pipefail
          if [[ -z "${CHATBAR_SUPABASE_URL}" || -z "${CHATBAR_SUPABASE_ANON_KEY}" ]]; then
            echo "Missing CHATBAR_SUPABASE_URL or CHATBAR_SUPABASE_ANON_KEY"
            exit 1
          fi
          echo "Supabase configuration ready; release APK will include Community backend configuration."

      - name: Test and build signed release APK
        working-directory: app
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/app/app/keystore/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          CHATBAR_VERSION_CODE: ${{ steps.version.outputs.versionCode }}
          CHATBAR_VERSION_NAME: ${{ steps.version.outputs.versionName }}
        run: |
          chmod +x gradlew
          ./gradlew test assembleRelease --no-daemon --stacktrace

      - name: Prepare release asset
        run: |
          release_apk="$(find app/app/build/outputs/apk/release -name '*.apk' ! -name '*unsigned*' | head -n 1)"
          if [[ -z "${release_apk}" ]]; then
            echo "Signed release APK not found"
            exit 1
          fi
          cp "${release_apk}" "ChatBar-${VERSION_NAME}.apk"

      - name: Commit version bump and tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/app/build.gradle.kts
          git commit -m "Release ${VERSION_NAME}"
          git tag -a "v${VERSION_NAME}" -m "ChatBar ${VERSION_NAME}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "v${VERSION_NAME}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION_NAME}" \
            "ChatBar-${VERSION_NAME}.apk#ChatBar-${VERSION_NAME}.apk" \
            --title "ChatBar ${VERSION_NAME}" \
            --notes "${RELEASE_NOTES}"
